name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MyAssembler
        uses: actions/checkout@v4

      - name: Checkout MyLinker
        uses: actions/checkout@v4
        with:
          repository: Keyhole-Koro/MyLinker
          path: ../MyLinker

      - name: Checkout MyEmulator
        uses: actions/checkout@v4
        with:
          repository: Keyhole-Koro/MyEmulator
          path: ../runtime/MyEmulator

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++

      - name: Build MyAssembler
        run: make all

      - name: Run unit tests
        run: make test

      - name: Run integration tests
        run: make test-integration
